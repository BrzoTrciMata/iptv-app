name: iptv_desktop_player
description: Desktop IPTV player built with Flutter, Xtream API, Provider, Dio, and media_kit.
publish_to: "none"

version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  dio: ^5.7.0
  media_kit: ^1.1.11
  media_kit_video: ^1.2.5
  media_kit_libs_windows_video: ^1.0.9
  media_kit_libs_macos_video: ^1.1.4
  shared_preferences: ^2.3.2
  cached_network_image: ^3.4.1
  window_manager: ^0.5.1
  forui: ^0.22.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: Bungee
      fonts:
        - asset: assets/fonts/Bungee-Regular.ttf
